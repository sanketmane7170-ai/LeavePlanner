# ─────────────────────────────────────────────────────────────────────────────
# Nginx server block for the Leave Planner (project #2).
# This is a SEPARATE file in /etc/nginx/sites-available/ — it never edits
# project #1's config. Both the frontend and API are served from ONE origin
# so the secure, sameSite=strict auth cookie works and there is no CORS.
#
#   https://<your-domain>/         → Next.js frontend  (127.0.0.1:4003)
#   https://<your-domain>/api/     → Express backend   (127.0.0.1:4001)
#
# 1. Point leave.agenthro.com DNS A-record at 103.212.120.17.
# 2. Enable + get HTTPS (see deploy/README.md — certbot step).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name leave.agenthro.com;

    # Certbot will inject the 443 block and an HTTP→HTTPS redirect here.

    client_max_body_size 2m;

    # ── API → Express backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Everything else → Next.js frontend ───────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:4003;
        # `next start` builds server-side redirect Location headers from its bind
        # host (localhost:4003) and ignores the Host header, so rewrite them back
        # to the public domain. Covers /login, dashboard, role redirects, etc.
        proxy_redirect ~^https?://(localhost|127\.0\.0\.1):4003(/.*)$ https://leave.agenthro.com$2;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
